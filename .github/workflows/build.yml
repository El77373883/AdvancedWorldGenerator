name: Build AdvancedWorldGenerator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar con Maven
        run: mvn clean package -B

      - name: Mostrar errores si falla
        if: failure()
        run: |
          echo "================================"
          echo "  ERROR AL COMPILAR EL PLUGIN"
          echo "  Revisa los logs arriba"
          echo "================================"
          mvn clean package 2>&1 | grep -E "ERROR|error|WARN"

      - name: Subir JAR si compila bien
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedWorldGenerator-1.0.0
          path: target/AdvancedWorldGenerator-1.0.0.jar
          retention-days: 7

      - name: Mensaje de exito
        if: success()
        run: |
          echo "================================"
          echo "  PLUGIN COMPILADO CON EXITO"
          echo "  Descarga el JAR en Artifacts"
          echo "================================"
